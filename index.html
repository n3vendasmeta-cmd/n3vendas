<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Biblioteca SQL</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f8f9fa;
}

.titulo {
    text-align: center;
    font-size: 42px;
    margin-bottom: 10px;
}

.linha {
    width: 350px;
    border: none;
    border-top: 3px solid #333;
    margin: 0 auto 40px auto;
}

.pasta {
    margin-bottom: 15px;
    background: #ffffff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px;
}

.script {
    margin-left: 20px;
}

summary {
    cursor: pointer;
    font-weight: bold;
    font-size: 18px;
    padding: 6px;
}

pre {
    background: #f4f4f4;
    padding: 12px;
    border-radius: 5px;
    overflow-x: auto;
    white-space: pre-wrap;
}
</style>

</head>

<body>

<h1 class="titulo">Biblioteca SQL</h1>
<hr class="linha">

<div id="conteudo"></div>

<script>
const usuario = "n3vendasmeta-cmd";
const repositorio = "n3vendas";

const pastas = [
    "VENDA",
    "LMC"
];

async function carregar() {
    const container = document.getElementById("conteudo");

    for (const pasta of pastas) {

        const grupo = document.createElement("details");
        grupo.className = "pasta";

        const titulo = document.createElement("summary");
        titulo.innerText = "📁 " + pasta;

        grupo.appendChild(titulo);
        container.appendChild(grupo);

        const resposta = await fetch(
            `https://api.github.com/repos/${usuario}/${repositorio}/contents/${pasta}`
        );
        console.log("Status:", resposta.status);
        if (!resposta.ok)
            continue;

        const arquivos = await resposta.json();
        console.log("Pasta:", pasta);
        console.log("Arquivos:", arquivos);

        for (const arquivo of arquivos) {

            if (!arquivo.name.toLowerCase().endsWith(".sql"))
                continue;

            const details = document.createElement("details");
            details.className = "script";

            const summary = document.createElement("summary");
            summary.innerText = "📄 " + arquivo.name;

            details.appendChild(summary);

            details.addEventListener("toggle", async () => {
                if (!details.open) return;
                if (details.dataset.carregado) return;

                const sql = await fetch(arquivo.download_url);
                const texto = await sql.text();

                const pre = document.createElement("pre");
                pre.textContent = texto;

                details.appendChild(pre);
                details.dataset.carregado = "1";
            });

            grupo.appendChild(details);
        }
    }
}

carregar();
</script>

</body>
</html>
