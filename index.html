<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Biblioteca SQL</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f8f9fa;
}

.titulo {
    text-align: center;
    font-size: 42px;
    margin-bottom: 10px;
}

.linha {
    width: 350px;
    border: none;
    border-top: 3px solid #333;
    margin: 0 auto 40px auto;
}

.pasta {
    margin-bottom: 15px;
    background: #ffffff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px;
}

.subpasta {
    margin-left: 20px;
    margin-top: 5px;
    margin-bottom: 5px;
    background: #fcfcfc;
    border-left: 3px solid #007bff;
    padding-left: 5px;
}

.script {
    margin-left: 20px;
}

summary {
    cursor: pointer;
    font-weight: bold;
    font-size: 18px;
    padding: 6px;
}

.subpasta > summary {
    font-size: 16px;
    color: #333;
}

pre {
    background: #f4f4f4;
    padding: 12px 40px 12px 12px;
    border-radius: 5px;
    overflow-x: auto;
    white-space: pre-wrap;
}

.btn-copiar {
    position: absolute;
    top: 8px;
    right: 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: #666;
    padding: 4px;
}

.btn-copiar:hover {
    color: #000;
}

.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #28a745;
    color: #fff;
    padding: 12px 18px;
    border-radius: 6px;
    font-size: 14px;
    opacity: 0;
    transition: opacity .3s;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
}
</style>
</head>

<body>

<h1 class="titulo">Biblioteca SQL</h1>
<hr class="linha">

<div id="conteudo"></div>

<script>
// 1. Corrigida a estrutura e adicionados os novos nomes de scripts
const scripts = {
    "N3": [
        "CriarLog.sql",
        "CriarTabelaBackup.sql",
        "UsuarioUnico.sql",
        "SenhaSA.sql",
        "AbortarNFeNFCe.sql"
    ],
    "VENDA": [
        "ValidarMovimentacoesEstoqueEntreVendaOriginalEDevolucao.sql",
        "AbortarNFeNFCe.sql"
    ],
    "LMC": [
        "ListarConfiguraçõesLMC.sql"
],
    "IPIRANGA": {
        "_arquivos": [
            "ConciliacaoEnvioXMovimentoIpiranga.sql" 
        ],
        "CONCILIACAO": [
            "ConciliacaoEnvioXMovimentoIpiranga.sql",
            "DetalheAtrasoEnvioD1Ipiranga.sql"
        ]
    }
};

function mostrarToast(mensagem) {
    let toast = document.getElementById("toast");

    if (!toast) {
        toast = document.createElement("div");
        toast.id = "toast";
        toast.className = "toast";
        document.body.appendChild(toast);
    }

    toast.textContent = mensagem;
    toast.classList.add("show");

    clearTimeout(toast.timer);

    toast.timer = setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

async function copiarTexto(texto) {
    try {
        await navigator.clipboard.writeText(texto);
        mostrarToast("✅ Script copiado com sucesso!");
    } catch {
        const textarea = document.createElement("textarea");
        textarea.value = texto;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        textarea.style.top = "-9999px";

        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        document.execCommand("copy");
        document.body.removeChild(textarea);

        mostrarToast("✅ Script copiado com sucesso!");
    }
}

// Função auxiliar para criar o elemento de cada script individual
function criarElementoScript(nomeArquivo, caminhoPasta) {
    const details = document.createElement("details");
    details.className = "script";

    const summary = document.createElement("summary");
    summary.innerText = "📄 " + nomeArquivo;

    details.appendChild(summary);

    details.addEventListener("toggle", async () => {
        if (!details.open) return;
        if (details.dataset.carregado) return;

        try {
            // Monta a URL correta considerando subpastas (ex: IPIRANGA/CONCILIACAO/Arquivo.sql)
            const resposta = await fetch(`${caminhoPasta}/${nomeArquivo}`);

            if (!resposta.ok) {
                throw new Error("Arquivo não encontrado");
            }

            const texto = await resposta.text();

            const wrapper = document.createElement("div");
            wrapper.style.position = "relative";

            const botao = document.createElement("button");
            botao.className = "btn-copiar";
            botao.title = "Copiar Script";
            botao.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>`;

            botao.onclick = (e) => {
                e.stopPropagation();
                copiarTexto(texto);
            };

            const pre = document.createElement("pre");
            pre.textContent = texto;

            wrapper.appendChild(botao);
            wrapper.appendChild(pre);

            details.appendChild(wrapper);
            details.dataset.carregado = "1";
        } catch (erro) {
            const pre = document.createElement("pre");
            pre.textContent = "Erro ao carregar o arquivo: " + nomeArquivo;
            details.appendChild(pre);
            details.dataset.carregado = "1";
        }
    });

    return details;
}

// 2. Nova função de carregamento que aceita múltiplos níveis de pastas de forma recursiva
function carregar() {
    const container = document.getElementById("conteudo");

    for (const pasta in scripts) {
        const grupo = document.createElement("details");
        grupo.className = "pasta";

        const titulo = document.createElement("summary");
        titulo.innerText = "📁 " + pasta;
        grupo.appendChild(titulo);
        container.appendChild(grupo);

        const conteudoPasta = scripts[pasta];

        if (Array.isArray(conteudoPasta)) {
            // Se for uma lista direta de arquivos (padrão antigo)
            for (const nomeArquivo of conteudoPasta) {
                grupo.appendChild(criarElementoScript(nomeArquivo, pasta));
            }
        } else if (typeof conteudoPasta === "object") {
            // Se possuir subpastas (como o novo modelo do IPIRANGA)
            for (const subpasta in conteudoPasta) {
                const subGrupo = document.createElement("details");
                subGrupo.className = "subpasta";

                const subTitulo = document.createElement("summary");
                subTitulo.innerText = "📁 " + subpasta;
                subGrupo.appendChild(subTitulo);
                grupo.appendChild(subGrupo);

                for (const nomeArquivo of conteudoPasta[subpasta]) {
                    // Passa o caminho completo combinado para o fetch "IPIRANGA/CONCILIACAO"
                    subGrupo.appendChild(criarElementoScript(nomeArquivo, `${pasta}/${subpasta}`));
                }
            }
        }
    }
}

carregar();
</script>

</body>
</html>
