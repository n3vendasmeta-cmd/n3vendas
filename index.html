<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Biblioteca SQL</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f8f9fa;
}

.titulo {
    text-align: center;
    font-size: 42px;
    margin-bottom: 10px;
}

.linha {
    width: 350px;
    border: none;
    border-top: 3px solid #333;
    margin: 0 auto 40px auto;
}

.pasta {
    margin-bottom: 15px;
    background: #ffffff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px;
}

.script {
    margin-left: 20px;
}

summary {
    cursor: pointer;
    font-weight: bold;
    font-size: 18px;
    padding: 6px;
}

pre {
    background: #f4f4f4;
    padding: 12px;
    border-radius: 5px;
    overflow-x: auto;
    white-space: pre-wrap;
}
    .btn-copiar {
    position: absolute;
    top: 8px;
    right: 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 20px;
    color: #666;
}

.btn-copiar:hover {
    color: #000;
}
</style>
</head>

<body>

<h1 class="titulo">Biblioteca SQL</h1>
<hr class="linha">

<div id="conteudo"></div>

<script>
const scripts = {
    "VENDA": [
        "ValidarMovimentacoesEstoqueEntreVendaOriginalEDevolucao.sql",
        "AbortarNFeNFCe.sql"
    ],
    "LMC": [
        "ListarConfiguraçõesLMC.sql"
    ]
};

async function carregar() {
    const container = document.getElementById("conteudo");

    for (const pasta in scripts) {
        const grupo = document.createElement("details");
        grupo.className = "pasta";

        const titulo = document.createElement("summary");
        titulo.innerText = "📁 " + pasta;

        grupo.appendChild(titulo);
        container.appendChild(grupo);

        for (const nomeArquivo of scripts[pasta]) {
            const details = document.createElement("details");
            details.className = "script";

            const summary = document.createElement("summary");
            summary.innerText = "📄 " + nomeArquivo;

            details.appendChild(summary);

            details.addEventListener("toggle", async () => {
                if (!details.open) return;
                if (details.dataset.carregado) return;

                const resposta = await fetch(`${pasta}/${nomeArquivo}`);
                const texto = await resposta.text();

                const wrapper = document.createElement("div");
wrapper.style.position = "relative";

const botao = document.createElement("button");
botao.className = "btn-copiar";
botao.innerHTML = `
<svg xmlns="http://www.w3.org/2000/svg"
     width="16"
     height="16"
     viewBox="0 0 24 24"
     fill="none"
     stroke="currentColor"
     stroke-width="2">
    <rect x="9" y="9" width="13" height="13" rx="2"></rect>
    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
</svg>`;
botao.title = "Copiar Script";

botao.onclick = () => navigator.clipboard.writeText(texto);

const pre = document.createElement("pre");
pre.textContent = texto;

wrapper.appendChild(botao);
wrapper.appendChild(pre);

details.appendChild(wrapper);
details.dataset.carregado = "1";
            });

            grupo.appendChild(details);
        }
    }
}

carregar();
</script>

</body>
</html>
