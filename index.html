<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biblioteca SQL</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f8f9fa;
}

.titulo {
    text-align: center;
    font-size: 42px;
    margin-bottom: 10px;
}

.linha {
    width: 350px;
    border: none;
    border-top: 3px solid #333;
    margin: 0 auto 40px auto;
}

.pasta {
    margin-bottom: 15px;
    background: #ffffff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px;
}

.subpasta {
    margin-left: 20px;
    margin-top: 5px;
    margin-bottom: 5px;
    background: #fcfcfc;
    border-left: 3px solid #007bff;
    padding-left: 5px;
}

.script {
    margin-left: 20px;
}

summary {
    cursor: pointer;
    font-weight: bold;
    font-size: 18px;
    padding: 6px;
}

.subpasta > summary {
    font-size: 16px;
    color: #333;
}

pre {
    background: #f4f4f4;
    padding: 16px 52px 16px 16px;
    border-radius: 6px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
}

.script-wrapper {
    position: relative;
    margin-top: 6px;
}

.btn-copiar {
    position: absolute;
    top: 8px;
    right: 8px;

    width: 34px;
    height: 34px;

    display: flex;
    align-items: center;
    justify-content: center;

    border: none;
    border-radius: 7px;

    background: transparent;
    color: #666;

    cursor: pointer;
    transition:
        background-color 0.2s ease,
        color 0.2s ease;

    z-index: 10;
}

.btn-copiar:hover {
    background: #e5e5e5;
    color: #000;
}

.btn-copiar:active {
    transform: scale(0.95);
}

.btn-copiar svg {
    pointer-events: none;
}

.btn-copiar.copiado {
    color: #16a34a;
}

.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;

    background: #202123;
    color: #ffffff;

    padding: 11px 16px;
    border-radius: 8px;

    font-size: 14px;

    opacity: 0;
    pointer-events: none;

    transform: translateY(10px);

    transition:
        opacity 0.3s ease,
        transform 0.3s ease;

    z-index: 9999;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<h1 class="titulo">Biblioteca SQL</h1>
<hr class="linha">

<div id="conteudo"></div>

<script>
const scripts = {
    "BR": [
        "BRMania_ReconstituirPayloadJsonVendasEnviadas.sql"
    ],

    "N3": [
        "CriarLog.sql",
        "CriarTabelaBackup.sql",
        "UsuarioUnico.sql",
        "SenhaSA.sql",
        "AbortarNFeNFCe.sql",
        "UsuarioSenhaHospedagem.sql",
        "NomeBranch.sql"
    ],

    "VENDA": [
        "ValidarMovimentacoesEstoqueEntreVendaOriginalEDevolucao.sql",
        "AbortarNFeNFCe.sql",
        "ComandaLocalPreparoPedido.sql",
        "ComandaLocalPreparoHistoricoItem.sql"
    ],

    "LMC": [
        "ListarConfiguraçõesLMC.sql"
    ],

    "IPIRANGA": {
        "arquivos": [
            "ValidarSalesVendasIpiranga.sql"
        ],

        "subpastas": {
            "CONCILIACAO": [
                "AnaliseD1ItemItemIpiranga.sql",
                "ConciliacaoEnvioXMovimentoIpiranga.sql",
                "DetalheAtrasoEnvioD1Ipiranga.sql"
            ]
        }
    }
};

const iconeCopiar = `
    <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
    >
        <rect
            x="8"
            y="8"
            width="12"
            height="12"
            rx="2"
        ></rect>

        <path
            d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"
        ></path>
    </svg>
`;

const iconeCopiado = `
    <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
    >
        <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
`;

function mostrarToast(mensagem) {
    let toast = document.getElementById("toast");

    if (!toast) {
        toast = document.createElement("div");
        toast.id = "toast";
        toast.className = "toast";

        document.body.appendChild(toast);
    }

    toast.textContent = mensagem;
    toast.classList.add("show");

    clearTimeout(toast.timer);

    toast.timer = setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

async function copiarTexto(texto) {
    try {
        await navigator.clipboard.writeText(texto);
        return true;
    } catch {
        try {
            const textarea = document.createElement("textarea");

            textarea.value = texto;
            textarea.style.position = "fixed";
            textarea.style.left = "-9999px";
            textarea.style.top = "-9999px";

            document.body.appendChild(textarea);

            textarea.focus();
            textarea.select();

            const copiado = document.execCommand("copy");

            document.body.removeChild(textarea);

            return copiado;
        } catch {
            return false;
        }
    }
}

function criarElementoScript(nomeArquivo, caminhoPasta) {
    const details = document.createElement("details");
    details.className = "script";

    const summary = document.createElement("summary");
    summary.textContent = "📄 " + nomeArquivo;

    details.appendChild(summary);

    details.addEventListener("toggle", async () => {
        if (!details.open) {
            return;
        }

        if (details.dataset.carregado === "1") {
            return;
        }

        try {
            const caminhoArquivo = `${caminhoPasta}/${nomeArquivo}`;
            const resposta = await fetch(caminhoArquivo);

            if (!resposta.ok) {
                throw new Error(
                    `Arquivo não encontrado. Caminho: ${caminhoArquivo}`
                );
            }

            const texto = await resposta.text();

            const wrapper = document.createElement("div");
            wrapper.className = "script-wrapper";

            const botao = document.createElement("button");

            botao.type = "button";
            botao.className = "btn-copiar";
            botao.title = "Copiar script";
            botao.setAttribute("aria-label", "Copiar script");
            botao.innerHTML = iconeCopiar;

            botao.addEventListener("click", async (evento) => {
                evento.preventDefault();
                evento.stopPropagation();

                const copiado = await copiarTexto(texto);

                if (!copiado) {
                    mostrarToast("Não foi possível copiar o script.");
                    return;
                }

                botao.innerHTML = iconeCopiado;
                botao.classList.add("copiado");
                botao.title = "Copiado";
                botao.setAttribute("aria-label", "Script copiado");

                mostrarToast("Script copiado");

                clearTimeout(botao.timer);

                botao.timer = setTimeout(() => {
                    botao.innerHTML = iconeCopiar;
                    botao.classList.remove("copiado");
                    botao.title = "Copiar script";
                    botao.setAttribute("aria-label", "Copiar script");
                }, 1800);
            });

            const pre = document.createElement("pre");
            pre.textContent = texto;

            wrapper.appendChild(botao);
            wrapper.appendChild(pre);

            details.appendChild(wrapper);

            details.dataset.carregado = "1";
        } catch (erro) {
            const pre = document.createElement("pre");

            pre.textContent =
                "Erro ao carregar o arquivo:\n\n" +
                nomeArquivo +
                "\n\n" +
                erro.message;

            details.appendChild(pre);

            details.dataset.carregado = "1";
        }
    });

    return details;
}

function criarSubpasta(
    nomeSubpasta,
    arquivos,
    pastaPrincipal
) {
    const subGrupo = document.createElement("details");
    subGrupo.className = "subpasta";

    const subTitulo = document.createElement("summary");
    subTitulo.textContent = "📁 " + nomeSubpasta;

    subGrupo.appendChild(subTitulo);

    for (const nomeArquivo of arquivos) {
        subGrupo.appendChild(
            criarElementoScript(
                nomeArquivo,
                `${pastaPrincipal}/${nomeSubpasta}`
            )
        );
    }

    return subGrupo;
}

function carregar() {
    const container = document.getElementById("conteudo");

    container.innerHTML = "";

    for (const nomePasta in scripts) {
        const grupo = document.createElement("details");
        grupo.className = "pasta";

        const titulo = document.createElement("summary");
        titulo.textContent = "📁 " + nomePasta;

        grupo.appendChild(titulo);

        const conteudoPasta = scripts[nomePasta];

        if (Array.isArray(conteudoPasta)) {
            for (const nomeArquivo of conteudoPasta) {
                grupo.appendChild(
                    criarElementoScript(
                        nomeArquivo,
                        nomePasta
                    )
                );
            }
        } else if (
            conteudoPasta !== null &&
            typeof conteudoPasta === "object"
        ) {
            const arquivosRaiz =
                conteudoPasta.arquivos || [];

            const subpastas =
                conteudoPasta.subpastas || {};

            for (const nomeArquivo of arquivosRaiz) {
                grupo.appendChild(
                    criarElementoScript(
                        nomeArquivo,
                        nomePasta
                    )
                );
            }

            for (const nomeSubpasta in subpastas) {
                grupo.appendChild(
                    criarSubpasta(
                        nomeSubpasta,
                        subpastas[nomeSubpasta],
                        nomePasta
                    )
                );
            }
        }

        container.appendChild(grupo);
    }
}

document.addEventListener(
    "DOMContentLoaded",
    carregar
);
</script>

</body>
</html>
